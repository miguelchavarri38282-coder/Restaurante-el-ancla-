<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurante El Ancla | Las Isletas de Granada</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* --- ESTILOS GENERALES Y COLORES BASE --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0f172a; /* Fondo oscuro elegante (Azul noche) */
            color: #f8fafc;
            line-height: 1.6;
        }

        /* --- BARRA DE NAVEGACIÓN (MENÚ SUPERIOR) --- */
        header {
            background-color: rgba(15, 23, 42, 0.95);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #b45309; /* Línea dorada/madera */
            z-index: 1000;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: bold;
            color: #fbbf24; /* Dorado */
            letter-spacing: 1px;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 20px;
        }

        .nav-links a {
            color: #f8fafc;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #fbbf24;
        }

        /* --- SECCIÓN PRINCIPAL (BIENVENIDA) --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.85)), 
                        url('https://images.unsplash.com/photo-1544025162-d76694265947?q=80&w=1200') no-repeat center center/cover;
            /* Nota: Más adelante podemos cambiar esta foto por una real de las Isletas */
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            margin-bottom: 10px;
            color: #ffffff;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .hero p {
            font-size: 1.2rem;
            color: #cbd5e1;
            margin-bottom: 30px;
            max-width: 600px;
        }

        /* Botón de llamado a la acción */
        .btn-menu {
            display: inline-block;
            padding: 12px 30px;
            background-color: #b45309; /* Color arcilla/madera nica */
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            border-radius: 5px;
            box-shadow: 0 4px 15px rgba(180, 83, 9, 0.4);
            transition: all 0.3s ease;
        }

        .btn-menu:hover {
            background-color: #d97706;
            transform: translateY(-2px);
        }

        /* Adaptación para pantallas de celulares */
        @media (max-width: 600px) {
            .hero h1 { font-size: 2.5rem; }
            .hero p { font-size: 1rem; }
            header { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">⚓ El Ancla</div>
        <nav>
            <ul class="nav-links">
                <li><a href="#inicio">Inicio</a></li>
                <li><a href="#menu">Nuestro Menú</a></li>
                <li><a href="#contacto">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero" id="inicio">
        <h1>Restaurante El Ancla</h1>
        <p>Disfruta de la mejor sazón frente al lago, rodeado de la naturaleza única de Las Isletas de Granada, Nicaragua.</p>
        <a href="#menu" class="btn-menu">Ver Menú del Día</a>
    </section>

</body>
</html>
